name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "TEO-*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet:
    name: .NET build and tests
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore
        run: dotnet restore

      - name: Python asset tool tests
        run: python -m unittest tools.tests.test_merge_gltf_animations -v
        env:
          PYTHONDONTWRITEBYTECODE: "1"

      - name: .NET tests
        run: dotnet test --no-restore

      - name: Build
        run: dotnet build --no-restore
